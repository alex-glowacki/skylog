# Grafana datasource provisioning — InfluxDB v2
apiVersion: 1

datasources:
  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://localhost:8086 # Update to your InfluxDB LXC IP/port
    jsonData:
      version: Flux
      organization: skylog # Match your InfluxDB org name
      defaultBucket: skylog # Match your InfluxDB bucket name
      tlsSkipVerify: true
    secureJsonData:
      token: __INFLUXDB_TOKEN__ # Replace at deploy time (env var or Ansible)
    isDefault: true
